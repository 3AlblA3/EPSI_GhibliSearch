<div class="list-page">
  <form class="search-form" [formGroup]="searchForm">
    <div class="search-container">
      <label>Nom</label>
      <input type="text" formControlName="searchName" placeholder="Chercher par nom" />
    </div>
  </form>

  <ul class="resource-list">
  @for(specie of filteredSpecies; track specie.id) {
    <li>
      <a class="details-link" [routerLink]="['/species', specie.id]" [textContent]="specie.name"></a>
    </li>
  }
  </ul>
</div>

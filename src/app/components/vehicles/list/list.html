<div class="list-page">
  <form class="search-form" [formGroup]="searchForm">
    <div class="search-container">
      <label>Nom</label>
      <input type="text" formControlName="searchName" placeholder="Chercher par nom" />
    </div>
  </form>

  <ul class="resource-list">
    <li *ngFor="let vehicle of filteredVehicles; trackBy: trackById">
      <a [routerLink]="['/vehicles', vehicle.id]">{{ vehicle.name }}</a>
    </li>
  </ul>
</div>

<div class="list-page">
  <form class="search-form" [formGroup]="searchForm">
    <div class="search-container">
      <label>Nom</label>
      <input type="text" formControlName="searchName" placeholder="Chercher par nom" />
    </div>
  </form>

  <ul class="resource-list">
    @for(person of filteredPeople; track person.id) {
    <li >
      <a class="details-link" [routerLink]="['/people', person.id]" [textContent]="person.name"></a>
    </li>
  }
  </ul>
</div>
